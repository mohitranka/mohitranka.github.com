<!DOCTYPE html>
<html lang="{{ DEFAULT_LANG }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
    {% block meta %}
    <meta name="description" content="{% block description %}Engineering leader. Builder of data platforms, developer tooling, and reliable distributed backends.{% endblock %}">
    <meta name="author" content="{{ AUTHOR }}">
    <meta name="robots" content="index, follow">
    {% endblock %}
    <link rel="canonical" href="{% block canonical %}{{ SITEURL }}/{% endblock %}">
    <link rel="alternate" type="application/atom+xml" title="{{ SITENAME }}" href="{{ SITEURL }}/atom.xml">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:site_name" content="{{ SITENAME }}">
    <meta property="og:locale" content="en_US">
    <meta property="og:url" content="{% block og_url %}{{ SITEURL }}/{% endblock %}">
    <meta property="og:title" content="{% block og_title %}{{ SITENAME }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Engineering leader. Builder of data platforms, developer tooling, and reliable distributed backends.{% endblock %}">
    <meta property="og:image" content="{{ SITEURL }}/theme/images/og.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}{{ SITENAME }}{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Engineering leader. Builder of data platforms, developer tooling, and reliable distributed backends.{% endblock %}">
    <meta name="twitter:image" content="{{ SITEURL }}/theme/images/og.png">
    <link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css">
    {% block head_extra %}{% endblock %}
</head>

<body>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>

</html>
