<!DOCTYPE html>
<html lang="{{ DEFAULT_LANG }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
    {% block meta %}
    <meta name="description" content="{% block description %}Engineering leader. Builder of data platforms, developer tooling, and reliable distributed backends.{% endblock %}">
    <meta name="author" content="{{ AUTHOR }}">
    <meta name="robots" content="index, follow">
    {% endblock %}
    <link rel="canonical" href="{% block canonical %}{{ SITE_ORIGIN }}/{% endblock %}">
    <link rel="alternate" type="application/atom+xml" title="{{ SITENAME }} — Atom" href="{{ SITE_ORIGIN }}/atom.xml">
    <link rel="alternate" type="application/rss+xml" title="{{ SITENAME }} — RSS" href="{{ SITE_ORIGIN }}/rss.xml">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:site_name" content="{{ SITENAME }}">
    <meta property="og:locale" content="en_US">
    <meta property="og:url" content="{% block og_url %}{{ SITE_ORIGIN }}/{% endblock %}">
    <meta property="og:title" content="{% block og_title %}{{ SITENAME }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Engineering leader. Builder of data platforms, developer tooling, and reliable distributed backends.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{{ SITE_ORIGIN }}/theme/images/og.png{% endblock %}">
    <meta property="og:image:width" content="{% block og_image_width %}1200{% endblock %}">
    <meta property="og:image:height" content="{% block og_image_height %}630{% endblock %}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}{{ SITENAME }}{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Engineering leader. Builder of data platforms, developer tooling, and reliable distributed backends.{% endblock %}">
    <meta name="twitter:image" content="{% block twitter_image %}{{ SITE_ORIGIN }}/theme/images/og.png{% endblock %}">
    <link rel="preload" href="{{ SITEURL }}/theme/fonts/inter.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css">
    {% if GOOGLE_ANALYTICS %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ GOOGLE_ANALYTICS }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ GOOGLE_ANALYTICS }}');
    </script>
    {% endif %}
    {% block head_extra %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    <main>
        <header class="site-header">
            {% block site_brand %}
            <a class="site-logo" href="{{ SITEURL }}/">{{ SITENAME }}</a>
            {% endblock %}
            <nav class="site-nav" aria-label="Primary">
                <a href="{{ SITEURL }}/blog/"{% if output_file is defined and output_file == 'blog/index.html' %} aria-current="page"{% endif %}>Writing</a>
                <a href="{{ SITEURL }}/work/"{% if output_file is defined and output_file.startswith('work') %} aria-current="page"{% endif %}>Work</a>
                <a href="{{ SITEURL }}/contact/"{% if output_file is defined and output_file.startswith('contact') %} aria-current="page"{% endif %}>Contact</a>
            </nav>
        </header>

        {% block content %}{% endblock %}
    </main>
</body>

</html>
